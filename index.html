<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Python オセロ AI 10連戦</title>
    <style>
        /* 盤面のデザイン */
        #board {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            gap: 2px;
            background-color: #333;
            width: fit-content;
            margin: 20px auto;
            border: 5px solid #333;
        }

        .cell {
            width: 50px;
            height: 50px;
            background-color: #2e7d32;
            /* オセロの緑色 */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* 置ける場所のガイド */
        .cell.valid::after {
            content: "";
            width: 10px;
            height: 10px;
            background-color: rgba(1, 248, 215, 0.5);
            border-radius: 50%;
        }

        /* 石のデザイン */
        .stone {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            box-shadow: 2px 3px 5px rgba(0, 0, 0, 0.3);
            /* 影をつけて浮き上がらせる */
            transition: transform 0.3s ease-in-out;
            /* 裏返る時のアニメーション準備 */
        }

        .black {
            background: radial-gradient(circle at 30% 30%, #444, #000);
            /* 光沢 */
        }

        .white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            /* 光沢 */
        }

        .info {
            text-align: center;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div class="info">
        <h1>オセロ AI 10連戦</h1>
        <p id="status">第 <span id="match-num">1</span> 戦目 (現在の成績: <span id="wins">0</span>勝 <span id="losses">0</span>敗)
        </p>
        <p id="status">あなたの番です（黒）</p>

    </div>

    <div id="board"></div>

    <script>
        let boardData = Array(8).fill().map(() => Array(8).fill(0));
        // 初期配置
        boardData[3][3] = boardData[4][4] = 2;
        boardData[3][4] = boardData[4][3] = 1;

        const boardElement = document.getElementById('board');

        function drawBoard(validMoves = []) {
            boardElement.innerHTML = '';
            boardData.forEach((row, r) => {
                row.forEach((cell, c) => {
                    const div = document.createElement('div');
                    div.className = 'cell';

                    // 置ける場所なら 'valid' クラスを追加
                    if (validMoves.some(m => m[0] === r && m[1] === c)) {
                        div.classList.add('valid');
                    }

                    div.onclick = () => makeMove(r, c);

                    if (cell !== 0) {
                        const stone = document.createElement('div');
                        stone.className = `stone ${cell === 1 ? 'black' : 'white'}`;
                        div.appendChild(stone);
                    }
                    boardElement.appendChild(div);
                });
            });
        }


        async function makeMove(r, c) {

            const response = await fetch('/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ r, c, board: boardData })
            });








            if (response.ok) {


                const data = await response.json();


                boardData = data.board;
                drawBoard(data.valid_moves); // AIの手後の置ける場所も更新

                // 戦績表示の更新
                document.getElementById('match-num').innerText = data.match_count;
                document.getElementById('wins').innerText = data.wins;
                document.getElementById('losses').innerText = data.losses;

                if (data.player_passed && !data.is_over) {
                    alert("あなたは置ける場所がないためパスになりました。AIが続けて打ちました。");
                }

                if (data.is_over) {
                    if (data.match_count > 10) {
                        alert(`10連戦終了！\n最終戦績: ${data.wins}勝 ${data.losses}敗`);
                        // セッションクリアのためにトップへリダイレクト
                        location.href = '/reset';
                    } else {
                        alert(`第${data.match_count - 1}戦終了！${data.result_msg} \n次へ進みます。`);
                        location.reload();
                    }


                }
            } else {
                alert("そこには置けません！");
            }
        }
        drawBoard(); 
    </script>
</body>

</html>
